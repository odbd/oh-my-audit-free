name: ci
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build
      - run: npm test --if-present
      # Smoke test: the built CLI scans this repo and emits valid SARIF.
      - run: node dist/cli.js scan . --sarif > /tmp/results.sarif
      - run: node -e "JSON.parse(require('fs').readFileSync('/tmp/results.sarif','utf8'))"

  secrets:
    # Dogfood: scan our own repo for committed secrets. We run the (free)
    # gitleaks CLI directly — the gitleaks-action wrapper now requires a paid
    # GITLEAKS_LICENSE for org repos, which we don't need just to run the tool.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install gitleaks
        run: |
          VERSION=8.18.4
          curl -sSL "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin gitleaks
      - name: Scan working tree for secrets
        run: gitleaks detect --source . --no-git --no-banner --redact --verbose
